<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #e8e4e0;
      --card:        #f0ecе6;
      --pink:        #f2a0b8;
      --pink-deep:   #e06080;
      --violet:      #4a3ab8;
      --violet-mid:  #6655d4;
      --violet-pale: #dcd8f8;
      --orange:      #e85820;
      --orange-pale: #fce4d8;
      --gray-dark:   #2e2e2e;
      --gray-mid:    #7a7670;
      --gray-light:  #d8d4ce;
      --white:       #faf8f5;
    }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(circle at 15% 85%, rgba(242,160,184,.18) 0%, transparent 45%),
        radial-gradient(circle at 85% 10%, rgba(74,58,184,.12) 0%, transparent 45%);
      font-family: 'Outfit', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 16px 48px;
    }

    /* ══ CARD ══ */
    .card {
      background: var(--white);
      border-radius: 28px;
      width: 100%;
      max-width: 380px;
      padding: 36px 28px 26px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 1px 0 rgba(255,255,255,.9) inset,
        0 24px 60px rgba(46,46,46,.14),
        0 4px 12px rgba(46,46,46,.08);
      animation: rise .6s cubic-bezier(.22,.68,0,1.2) both;
    }

    /* ── decorative background layer ── */
    .deco {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 28px;
    }

    /* large blob top-right */
    .blob-tr {
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
    }
    /* small blob bottom-left */
    .blob-bl {
      position: absolute;
      bottom: -50px; left: -40px;
      width: 200px; height: 200px;
      opacity: .7;
    }

    /* ── star elements ── */
    .star {
      position: absolute;
      pointer-events: none;
    }
    .star svg { display: block; }

    .s1 { top: 22px;  left: 24px;  }
    .s2 { top: 18px;  right: 26px; }
    .s3 { bottom: 80px; right: 20px; }
    .s4 { bottom: 160px; left: 18px; opacity: .45; }

    /* ══ HEADER ══ */
    .status {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--violet-pale);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px; font-weight: 500;
      color: var(--violet);
      margin-bottom: 20px;
      position: relative; z-index: 2;
    }
    .sdot {
      width: 6px; height: 6px;
      background: #3db87a; border-radius: 50%;
      box-shadow: 0 0 5px #3db87a;
      animation: blink 2s ease-in-out infinite;
    }

    .name-block {
      position: relative; z-index: 2;
      margin-bottom: 6px;
    }
    .name-top {
      font-family: 'Syne', sans-serif;
      font-size: 34px;
      font-weight: 800;
      color: var(--gray-dark);
      line-height: .95;
      letter-spacing: -1px;
    }
    .name-bot {
      font-family: 'Syne', sans-serif;
      font-size: 34px;
      font-weight: 800;
      color: var(--orange);
      line-height: .95;
      letter-spacing: -1px;
    }

    .sub {
      font-size: 12px; font-weight: 300;
      color: var(--gray-mid);
      letter-spacing: .3px;
      line-height: 1.55;
      margin-bottom: 22px;
      position: relative; z-index: 2;
    }

    /* ══ TAGS ══ */
    .section-label {
      font-size: 9px; letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      font-weight: 600;
      margin-bottom: 10px;
      position: relative; z-index: 2;
    }
    .tags {
      display: flex; flex-wrap: wrap; gap: 7px;
      margin-bottom: 24px;
      position: relative; z-index: 2;
    }
    .tag {
      background: var(--orange-pale);
      border-radius: 100px;
      padding: 5px 13px;
      font-size: 11.5px; font-weight: 500;
      color: var(--orange);
    }
    .tag.violet {
      background: var(--violet-pale);
      color: var(--violet);
    }

    /* ══ DIVIDER ══ */
    .divider {
      height: 1px;
      background: var(--gray-light);
      margin: 20px 0;
      position: relative; z-index: 2;
    }

    /* ══ CTA button ══ */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 16px 18px;
      border-radius: 16px;
      background: var(--violet);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 600;
      text-decoration: none;
      margin-bottom: 10px;
      position: relative; z-index: 2;
      transition: transform .12s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: .1px;
    }
    .btn-primary:active { transform: scale(.97); }
    .btn-arr {
      width: 30px; height: 30px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }

    /* ══ link rows ══ */
    .link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      background: transparent;
      border: 1.5px solid var(--gray-light);
      color: var(--gray-dark);
      font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 400;
      text-decoration: none;
      margin-bottom: 8px;
      position: relative; z-index: 2;
      transition: border-color .12s, background .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .link-row:hover   { border-color: var(--pink-deep); background: #fdf0f4; }
    .link-row:active  { transform: scale(.975); }
    .link-left        { display: flex; align-items: center; gap: 10px; }
    .link-ico {
      width: 32px; height: 32px;
      border-radius: 9px;
      background: var(--gray-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .link-arr { color: var(--gray-light); font-size: 17px; }

    /* ══ FOOTER ══ */
    .foot {
      text-align: center;
      padding-top: 18px;
      font-size: 10px;
      color: var(--gray-mid);
      position: relative; z-index: 2;
    }
    .foot b { color: var(--violet-mid); font-weight: 600; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(26px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes blink {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .4; transform: scale(1.5); }
    }
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes spinRev {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    .spin-slow { animation: spinSlow 18s linear infinite; transform-origin: center; }
    .spin-rev  { animation: spinRev 14s linear infinite; transform-origin: center; }
  </style>
