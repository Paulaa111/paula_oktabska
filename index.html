<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Paula Oktabska • IT dla Cukierni</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1208;
      font-family: 'DM Sans', sans-serif;
      color: #f5e6c8;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 14px 40px;
      background-image: radial-gradient(rgba(212,160,50,.05) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    .card {
      background: linear-gradient(160deg, #241a08 0%, #1a1208 55%, #1e1508 100%);
      border: 1px solid rgba(212,160,50,.22);
      border-radius: 28px;
      padding: 40px 26px 28px;
      width: 100%;
      max-width: 390px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.7), 0 0 80px rgba(180,100,20,.07);
      text-align: center;
      animation: fadeUp .55s cubic-bezier(.22,.68,0,1.2) both;
    }

    .card::before {
      content: '';
      position: absolute; top: -70px; right: -70px;
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(212,160,50,.13) 0%, transparent 68%);
      pointer-events: none;
    }
    .card::after {
      content: '';
      position: absolute; bottom: -50px; left: -50px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(180,70,30,.11) 0%, transparent 68%);
      pointer-events: none;
    }

    .card-topline {
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #b44a1e, #d4a032, #b44a1e);
      border-radius: 28px 28px 0 0;
    }

    /* Cienki, lekki serif – nowoczesne retro */
    .name {
      font-family: 'Cormorant', serif;
      font-size: 38px;
      font-weight: 300;
      font-style: italic;
      color: #f5e6c8;
      letter-spacing: 1px;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .sub {
      font-size: 12px;
      font-weight: 300;
      color: rgba(245,230,200,.42);
      line-height: 1.55;
      margin-bottom: 18px;
      letter-spacing: .3px;
    }

    .status {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(212,160,50,.07);
      border: 1px solid rgba(212,160,50,.28);
      border-radius: 100px;
      padding: 5px 15px;
      font-size: 12px; color: #d4a032;
      margin-bottom: 26px;
    }
    .dot {
      width: 7px; height: 7px;
      background: #d4a032; border-radius: 50%;
      box-shadow: 0 0 6px #d4a032;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .label {
      font-size: 10px; letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(180,74,30,.85);
      margin-bottom: 13px;
    }

    .tags {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      margin-bottom: 26px;
    }
    .tag {
      background: rgba(212,160,50,.07);
      border: 1px solid rgba(212,160,50,.2);
      border-radius: 100px;
      padding: 5px 13px;
      font-size: 11.5px;
      color: rgba(245,230,200,.78);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,160,50,.32), transparent);
      margin: 22px 0;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 15px 18px;
      margin-bottom: 10px;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none; outline: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: transform .13s, box-shadow .13s;
    }
    .btn:active { transform: scale(.955); }

    .primary {
      background: linear-gradient(135deg, #d4a032, #b44a1e);
      color: #1a1208;
      font-weight: 700;
      box-shadow: 0 4px 22px rgba(212,160,50,.32);
    }
    .primary:hover { box-shadow: 0 6px 30px rgba(212,160,50,.5); }

    .ghost {
      background: rgba(245,230,200,.04);
      border: 1px solid rgba(245,230,200,.08);
      color: rgba(245,230,200,.78);
      justify-content: space-between;
      font-weight: 400;
      font-size: 14.5px;
    }
    .ghost:hover { background: rgba(245,230,200,.08); }
    .arrow { opacity: .32; font-size: 15px; }

    .counter {
      font-size: 10px;
      color: rgba(245,230,200,.15);
      margin-top: 20px;
    }
    .counter b { color: rgba(212,160,50,.55); font-weight: 500; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(1.38); }
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-topline"></div>

  <div class="name">Paula Oktabska</div>
  <div class="sub">Automatyzacja Marketingu & UX<br>IT dla Cukierni</div>

  <div class="status">
    <div class="dot"></div>
    Dostępna teraz &nbsp;·&nbsp; Krosno / zdalnie
  </div>

  <div class="label">Co robię</div>
  <div class="tags">
    <span class="tag">🚀 Automatyzacja Sprzedaży</span>
    <span class="tag">🎨 Nowoczesne Strony WWW</span>
    <span class="tag">📈 Marketing online</span>
  </div>

  <div class="divider"></div>

  <a href="https://smartorder.streamlit.app/" target="_blank" rel="noopener noreferrer" class="btn primary">
    🚀 &nbsp; Konfigurator tortów – Sprawdź DEMO
  </a>

  <a href="tel:+48728470916" class="btn ghost">
    <span>📞 &nbsp; Zadzwoń teraz</span>
    <span class="arrow">›</span>
  </a>

  <a href="https://wa.me/48728470916?text=Cze%C5%9B%C4%87%20Paula!%20Widzia%C5%82am%20Twoj%C4%85%20wizyt%C3%B3wk%C4%99%20i%20chc%C4%99%20zapyta%C4%87%20o%20wsp%C3%B3%C5%82prac%C4%99."
     target="_blank" rel="noopener noreferrer" class="btn ghost">
    <span>💬 &nbsp; WhatsApp</span>
    <span class="arrow">›</span>
  </a>

  <a href="mailto:paulaoktabska@gmail.com" class="btn ghost">
    <span>✉️ &nbsp; Wyślij e-mail</span>
    <span class="arrow">›</span>
  </a>

  <div class="counter" id="counter">Ładowanie odwiedzin...</div>
</div>

<script>
  const key = 'paula_card_visits';
  try {
    const n = parseInt(localStorage.getItem(key) || '0') + 1;
    localStorage.setItem(key, n);
    fetch('https://api.countapi.xyz/hit/paula-oktabska-card/visits')
      .then(r => r.json())
      .then(d => {
        document.getElementById('counter').innerHTML =
          'Wizytówka odwiedzona <b>' + d.value + '</b> razy';
      })
      .catch(() => {
        document.getElementById('counter').innerHTML =
          'Wizytówka odwiedzona <b>' + n + '</b> razy';
      });
  } catch(e) {
    document.getElementById('counter').style.display = 'none';
  }
</script>

</body>
</html>
